<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Peekd — Support Admin</title>
<link rel="stylesheet" href="dash/dashboard.css">
<link rel="stylesheet" href="dash/pages.css">
<style>
  body { background: var(--bg); min-height: 100vh; }
  .admin-login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .admin-login { width: min(420px, 100%); padding: 28px; }
  .admin-login h1 { margin: 0 0 8px; font-size: 22px; }
  .admin-shell { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .admin-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .admin-head h1 { margin: 0; font-size: 24px; }
  .admin-grid { display: grid; grid-template-columns: 320px 1fr; gap: 16px; align-items: start; }
  .admin-side { overflow: hidden; max-height: calc(100vh - 120px); overflow-y: auto; padding: 10px; }
  .admin-main { min-height: calc(100vh - 120px); padding: 20px; }
  .admin-ticket-list { display: flex; flex-direction: column; gap: 8px; }
  .ticket-card.on { border-color: var(--accent); background: var(--accent-soft); }
  .admin-empty { color: var(--fg-mute); padding: 40px 12px; text-align: center; }
  .admin-status-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .admin-status-row .btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  @media (max-width: 900px) {
    .admin-grid { grid-template-columns: 1fr; }
    .admin-side, .admin-main { max-height: none; min-height: auto; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script src="admin-support.js"></script>
</body>
</html>
