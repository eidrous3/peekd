[build]
  publish = "."
  command = "npm install && node scripts/fetch-apple-egress-ips.js && node scripts/generate-config.js"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/"
  to = "/Peekd.html"
  status = 200

[[redirects]]
  from = "/adming"
  to = "/Peekd Admin Support.html"
  status = 200

[[redirects]]
  from = "/t/:token"
  to = "/.netlify/functions/track-click?k=:token"
  status = 200
  force = true

[build.environment]
  NODE_VERSION = "20"
